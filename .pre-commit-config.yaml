repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Lint e Formatação Python (Ruff substitui parte do flake8/isort)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  # Formatação Python (Black - para garantir compatibilidade total)
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black

  # SQL Lint (SQLFluff)
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.3.0
    hooks:
      - id: sqlfluff-lint
        args: [--dialect, duckdb]
        additional_dependencies:
          - sqlfluff-templater-dbt
          - dbt-duckdb==1.8.2
